name: CI — Lint & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    name: Lint, Gitleaks & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out code (full history for Gitleaks)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install '.[test]'

      - name: Lint for hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check .
          ruff format --check .

      - name: Run tests with pytest
        run: pytest --cov=greenkube --cov-report=term-missing --cov-report=json

      - name: Update README badges
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        run: |
          # Extract total coverage percentage from coverage.json
          COV=$(python -c "import json; d=json.load(open('coverage.json')); print(int(d['totals']['percent_covered_display'].rstrip('%')))")

          # Extract total test count from pytest exit (re-run with --tb=no -q to count)
          TEST_COUNT=$(pytest --tb=no -q 2>&1 | grep -oP '^\d+(?= passed)' || echo "0")

          # Determine badge colour by coverage level
          if   [ "$COV" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$COV" -ge 80 ]; then COLOR="green"
          elif [ "$COV" -ge 70 ]; then COLOR="yellowgreen"
          elif [ "$COV" -ge 60 ]; then COLOR="yellow"
          else                         COLOR="red"
          fi

          # Rewrite the two badge lines in README.md in-place
          sed -i "s|!\[Python Coverage\]([^)]*)|![Python Coverage](https://img.shields.io/badge/coverage%20python-${COV}%25-${COLOR})|g" README.md
          sed -i "s|!\[Tests\]([^)]*)|![Tests](https://img.shields.io/badge/tests-${TEST_COUNT}%20passed-brightgreen)|g" README.md

      - name: Commit updated README badges
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update coverage and test-count badges [skip ci]"
          file_pattern: README.md

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version=0.7.2 --verify=false

      - name: Lint Helm Chart
        run: helm lint ./helm-chart

      - name: Run Helm unit tests
        run: helm unittest helm-chart
