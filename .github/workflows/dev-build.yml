name: Dev — Build & Push

# Builds a development Docker image on every push to the dev branch.
# Images are tagged: dev-<short-sha> and dev-latest.
# This lets you test the latest development image in staging environments
# without polluting the release tag namespace.

on:
  push:
    branches: [dev]

jobs:
  build-dev-image:
    name: Build Dev Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            greenkube/greenkube:dev-${{ steps.vars.outputs.short_sha }}
            greenkube/greenkube:dev-latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
