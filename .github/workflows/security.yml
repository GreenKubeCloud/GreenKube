name: Security — Trivy Scan

# Runs on every push/PR and weekly to catch newly disclosed CVEs.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Weekly scan at 06:00 UTC every Monday
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Scan the GreenKube Docker image for OS and library CVEs ──
  trivy-image-greenkube:
    name: Trivy — GreenKube Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: greenkube/greenkube:scan
          pull: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'greenkube/greenkube:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: '.trivyignore'

      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: 'greenkube/greenkube:scan'
          format: 'sarif'
          output: 'trivy-greenkube.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
          trivyignores: '.trivyignore'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-greenkube.sarif'

  # ── Scan the PostgreSQL image for CVEs ──
  trivy-image-postgres:
    name: Trivy — PostgreSQL Image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on PostgreSQL image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'postgres:18-alpine'
          format: 'sarif'
          output: 'trivy-postgres.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
          trivyignores: '.trivyignore'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-postgres.sarif'

  # ── Scan Helm chart and Dockerfile for misconfigurations ──
  trivy-config:
    name: Trivy — Config & IaC
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Scan Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: './Dockerfile'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '1'

      - name: Scan Helm chart
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: './helm-chart'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  # ── Scan Python dependencies for known vulnerabilities ──
  trivy-fs:
    name: Trivy — Python Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Scan filesystem for vulnerable dependencies
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          scanners: 'vuln'

  # ── Scan frontend dependencies ──
  npm-audit:
    name: NPM Audit — Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
