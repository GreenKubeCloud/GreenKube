  artifacthub.io/changes: |
    - kind: security
      description: "Dockerfile: upgrade base images to node:22-alpine and run apt-get upgrade to patch OS CVEs (libssl3, zlib1g, ncurses)"
    - kind: security
      description: "Helm: full pod/container securityContext on all workloads (runAsNonRoot, readOnlyRootFilesystem, capabilities.drop ALL, seccompProfile RuntimeDefault)"
    - kind: security
      description: "Helm: remove secrets resource from ClusterRole (fixes critical RBAC over-permission)"
    - kind: security
      description: "Helm: PostgreSQL upgraded to postgres:18-alpine with scram-sha-256 authentication and liveness/readiness probes"
    - kind: security
      description: "API: OWASP security headers middleware (CSP, X-Frame-Options, Referrer-Policy, Permissions-Policy) and restricted CORS"
    - kind: security
      description: "CI: automated Trivy vulnerability scanning workflow for images and Helm IaC with SARIF upload"
    - kind: added
      description: "SQLite: SCD2 node snapshots for deduplication and recommendation scope column"
    - kind: added
      description: "PostgreSQL: configurable connection pool size (DB_POOL_MIN_SIZE, DB_POOL_MAX_SIZE) and statement timeout (DB_STATEMENT_TIMEOUT_MS)"
    - kind: fixed
      description: "aggregate_summary and aggregate_timeseries now query both raw and hourly tables; METRICS_AGGREGATED_RETENTION_DAYS defaults to -1 (infinite) for CSRD compliance"
    - kind: fixed
      description: "Trivy KSV-0014: added readOnlyRootFilesystem to PostgreSQL init container"
    - kind: fixed
      description: "Frontend npm audit: updated svelte, vite, rollup, picomatch, devalue to fix HIGH-severity advisories"
    - kind: changed
      description: "Storage layer refactored into postgres/, sqlite/, elastic/ subpackages for cleaner architecture"


