  - finops
  - greenops
  - fingreenops
  - carbon
  - co2
  - sustainability
  - kubernetes
  - monitoring
  - energy
  - csrd
  - esrs
  - carbon-footprint
  - cloud-cost
  - prometheus
  - grafana
  - opencost
