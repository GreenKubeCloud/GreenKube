apiVersion: v2
name: greenkube
description: >-
  GreenKube is an open-source FinGreenOps platform for Kubernetes. Measure,
  report (CSRD/ESRS E1), and optimize the carbon footprint and cloud costs of
  your workloads. Provides real-time CO₂e metrics, energy estimation, cost
  optimization recommendations, Grafana dashboard, and a REST API — deployable
  in minutes with a single Helm install.
type: application
icon: 
  https://raw.githubusercontent.com/GreenKubeCloud/GreenKube/refs/heads/main/assets/greenkube-logo.png
version: 0.2.8
appVersion: 0.2.8
