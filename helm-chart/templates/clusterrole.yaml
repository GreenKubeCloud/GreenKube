{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "greenkube.fullname" . }}
  labels:
    {{- include "greenkube.labels" . | nindent 4 }}
rules:
  # GreenKube needs to list nodes, pods, and services for discovery and data collection.
  # Secrets access is intentionally excluded (CRITICAL: KSV-0041).
- apiGroups: [""]
  resources:
  - nodes
  - pods
  - services
  - configmaps
  verbs:
  - get
  - list
  - watch
  # GreenKube needs to list HPAs to detect existing autoscalers before recommending new ones
- apiGroups: ["autoscaling"]
  resources:
  - horizontalpodautoscalers
  verbs:
  - get
  - list
{{- end }}