apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "greenkube.fullname" . }}
  labels:
    {{- include "greenkube.labels" . | nindent 4 }}
data:
  # --- General Config ---
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  # Name of the Helm-managed Secret — used by the API to persist runtime
  # configuration overrides (UI-set tokens/URLs) back into the Secret.
  GREENKUBE_SECRET_NAME: {{ include "greenkube.secretName" . | quote }}
  CLOUD_PROVIDER: {{ .Values.config.cloudProvider | quote }}
  CLUSTER_NAME: {{ .Values.config.clusterName | quote }}
  DEFAULT_INTENSITY: {{ .Values.config.defaultIntensity | quote }}
  DEFAULT_PUE: {{ .Values.config.defaults.pue | quote }}
  {{- if .Values.config.defaultZone }}
  DEFAULT_ZONE: {{ .Values.config.defaultZone | quote }}
  {{- end }}
  NORMALIZATION_GRANULARITY: {{ .Values.config.normalizationGranularity | quote }}
  NODE_ANALYSIS_INTERVAL: {{ .Values.config.nodeAnalysisInterval | quote }}
  NODE_DATA_MAX_AGE_DAYS: {{ .Values.config.nodeDataMaxAgeDays | quote }}
  METRICS_COMPRESSION_AGE_HOURS: {{ .Values.config.metricsCompressionAgeHours | quote }}
  METRICS_RAW_RETENTION_DAYS: {{ .Values.config.metricsRawRetentionDays | quote }}
  METRICS_AGGREGATED_RETENTION_DAYS: {{ .Values.config.metricsAggregatedRetentionDays | quote }}
  K8S_REQUEST_TIMEOUT: {{ .Values.config.k8sRequestTimeout | quote }}

  # --- Database Config ---
  DB_TYPE: {{ .Values.config.db.type | quote }}
  DB_PATH: {{ .Values.config.db.path | quote }}
  DB_SSL_MODE: {{ .Values.config.db.sslMode | quote }}
  DB_POOL_MIN_SIZE: {{ .Values.config.db.poolMinSize | quote }}
  DB_POOL_MAX_SIZE: {{ .Values.config.db.poolMaxSize | quote }}
  DB_STATEMENT_TIMEOUT_MS: {{ .Values.config.db.statementTimeoutMs | quote }}
  ELASTICSEARCH_HOSTS: {{ .Values.elasticsearch.hosts | quote }}
  ELASTICSEARCH_INDEX_NAME: {{ .Values.elasticsearch.indexName | quote }}
  ELASTICSEARCH_VERIFY_CERTS: {{ .Values.elasticsearch.verifyCerts | quote }}
  
  # --- Boavizta Config ---
  BOAVIZTA_API_URL: {{ .Values.config.boavizta.url | quote }}
  DEFAULT_EMBODIED_EMISSIONS_KG: {{ .Values.config.boavizta.defaultEmbodiedEmissionsKg | quote }}

  # --- Prometheus Collector Config ---
  # Note: PROMETHEUS_URL is managed in the Secret (supports UI-set overrides via lookup).
  PROMETHEUS_VERIFY_CERTS: {{ .Values.config.prometheus.verifyCerts | quote }}
  PROMETHEUS_QUERY_RANGE_STEP: {{ .Values.config.prometheus.queryRangeStep | quote }}
  PROMETHEUS_QUERY_RANGE_MAX_SAMPLES: {{ .Values.config.prometheus.queryRangeMaxSamples | quote }}
  PROMETHEUS_NODE_INSTANCE_LABEL: {{ .Values.config.prometheus.nodeInstanceLabel | quote }}

  # --- OpenCost Collector Config ---
  # Note: OPENCOST_API_URL is managed in the Secret (supports UI-set overrides via lookup).
  OPENCOST_VERIFY_CERTS: {{ .Values.config.opencost.verifyCerts | quote }}
  
  LOW_NODE_CPU_THRESHOLD: {{ .Values.config.lowNodeCpuThreshold | quote }}
  
  # --- API Config ---
  {{- if .Values.config.api.enabled }}
  API_HOST: {{ .Values.config.api.host | quote }}
  API_PORT: {{ .Values.config.api.port | quote }}
  CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  API_RATE_LIMIT: {{ .Values.config.apiRateLimit | quote }}
  {{- end }}

  # --- Estimator Defaults ---
  {{- with .Values.config.defaults.instance }}
  DEFAULT_INSTANCE_VCORES: {{ .vcores | quote }}
  DEFAULT_INSTANCE_MIN_WATTS: {{ .minWatts | quote }}
  DEFAULT_INSTANCE_MAX_WATTS: {{ .maxWatts | quote }}
  {{- end }}

  # --- Recommendation Engine Config ---
  {{- with .Values.config.recommendations }}
  RECOMMENDATION_LOOKBACK_DAYS: {{ .lookbackDays | quote }}
  RIGHTSIZING_CPU_THRESHOLD: {{ .rightsizingCpuThreshold | quote }}
  RIGHTSIZING_MEMORY_THRESHOLD: {{ .rightsizingMemoryThreshold | quote }}
  RIGHTSIZING_HEADROOM: {{ .rightsizingHeadroom | quote }}
  ZOMBIE_COST_THRESHOLD: {{ .zombieCostThreshold | quote }}
  ZOMBIE_ENERGY_THRESHOLD: {{ .zombieEnergyThreshold | quote }}
  AUTOSCALING_CV_THRESHOLD: {{ .autoscalingCvThreshold | quote }}
  AUTOSCALING_SPIKE_RATIO: {{ .autoscalingSpikeRatio | quote }}
  OFF_PEAK_IDLE_THRESHOLD: {{ .offPeakIdleThreshold | quote }}
  OFF_PEAK_MIN_IDLE_HOURS: {{ .offPeakMinIdleHours | quote }}
  IDLE_NAMESPACE_ENERGY_THRESHOLD: {{ .idleNamespaceEnergyThreshold | quote }}
  CARBON_AWARE_THRESHOLD: {{ .carbonAwareThreshold | quote }}
  NODE_UTILIZATION_THRESHOLD: {{ .nodeUtilizationThreshold | quote }}
  RECOMMEND_SYSTEM_NAMESPACES: {{ .recommendSystemNamespaces | quote }}
  {{- end }}
