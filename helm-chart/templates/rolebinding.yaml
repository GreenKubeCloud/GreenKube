{{- if and .Values.rbac.create (not .Values.secrets.existingSecret) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "greenkube.fullname" . }}-secret-writer
  labels:
    {{- include "greenkube.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "greenkube.fullname" . }}-secret-writer
subjects:
  - kind: ServiceAccount
    name: {{ include "greenkube.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
