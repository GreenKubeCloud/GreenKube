{{- if not .Values.secrets.existingSecret }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace (include "greenkube.fullname" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "greenkube.fullname" . }}
  labels:
    {{- include "greenkube.labels" . | nindent 4 }}
type: Opaque
data:
  # --- API Tokens ---
  # For each token: use the value from values.yaml when explicitly set;
  # otherwise fall back to the value already stored in the live Secret
  # (which may have been set from the GreenKube UI).  This guarantees
  # that a `helm upgrade` with default/empty values never wipes tokens
  # configured through the frontend.
  {{- $existingEmapsToken := "" }}
  {{- if $existingSecret }}
  {{- $existingEmapsToken = index $existingSecret.data "ELECTRICITY_MAPS_TOKEN" | default "" | b64dec }}
  {{- end }}
  {{- $emapsToken := .Values.secrets.electricityMapsToken | default $existingEmapsToken }}
  {{- if $emapsToken }}
  ELECTRICITY_MAPS_TOKEN: {{ $emapsToken | b64enc | quote }}
  {{- end }}

  {{- $existingBoaviztaToken := "" }}
  {{- if $existingSecret }}
  {{- $existingBoaviztaToken = index $existingSecret.data "BOAVIZTA_TOKEN" | default "" | b64dec }}
  {{- end }}
  {{- $boaviztaToken := .Values.secrets.boaviztaToken | default $existingBoaviztaToken }}
  {{- if $boaviztaToken }}
  BOAVIZTA_TOKEN: {{ $boaviztaToken | b64enc | quote }}
  {{- end }}

  {{- $existingApiKey := "" }}
  {{- if $existingSecret }}
  {{- $existingApiKey = index $existingSecret.data "GREENKUBE_API_KEY" | default "" | b64dec }}
  {{- end }}
  {{- $apiKey := .Values.secrets.apiKey | default $existingApiKey }}
  {{- if $apiKey }}
  GREENKUBE_API_KEY: {{ $apiKey | b64enc | quote }}
  {{- end }}

  # --- Runtime URL overrides (set from the UI, preserved across upgrades) ---
  # These keys are written into the Secret (not the ConfigMap) so that the
  # API server can update them at runtime via a K8s PATCH without restarting
  # the pod.  The Secret envFrom entry in the Deployment comes after the
  # ConfigMap entry, so these values take precedence over ConfigMap defaults.
  {{- $existingPrometheusUrl := "" }}
  {{- if $existingSecret }}
  {{- $existingPrometheusUrl = index $existingSecret.data "PROMETHEUS_URL" | default "" | b64dec }}
  {{- end }}
  {{- $prometheusUrl := .Values.config.prometheus.url | default $existingPrometheusUrl }}
  {{- if $prometheusUrl }}
  PROMETHEUS_URL: {{ $prometheusUrl | b64enc | quote }}
  {{- end }}

  {{- $existingOpencostUrl := "" }}
  {{- if $existingSecret }}
  {{- $existingOpencostUrl = index $existingSecret.data "OPENCOST_API_URL" | default "" | b64dec }}
  {{- end }}
  {{- $opencostUrl := .Values.config.opencost.url | default $existingOpencostUrl }}
  {{- if $opencostUrl }}
  OPENCOST_API_URL: {{ $opencostUrl | b64enc | quote }}
  {{- end }}

  {{- $existingBoaviztaUrl := "" }}
  {{- if $existingSecret }}
  {{- $existingBoaviztaUrl = index $existingSecret.data "BOAVIZTA_API_URL" | default "" | b64dec }}
  {{- end }}
  {{- $boaviztaUrl := .Values.config.boavizta.url | default $existingBoaviztaUrl }}
  {{- if $boaviztaUrl }}
  BOAVIZTA_API_URL: {{ $boaviztaUrl | b64enc | quote }}
  {{- end }}

  # --- Database Auth ---
  {{- if and .Values.postgres.enabled (eq .Values.config.db.type "postgres") }}
  {{- $existingPassword := "" }}
  {{- if $existingSecret }}
  {{- $existingPassword = index $existingSecret.data "POSTGRES_PASSWORD" | default "" | b64dec }}
  {{- end }}
  {{- $password := .Values.postgres.auth.password | default $existingPassword | default (randAlphaNum 24) }}
  POSTGRES_PASSWORD: {{ $password | b64enc | quote }}
  DB_CONNECTION_STRING: {{ printf "postgresql://%s:%s@%s-postgres:5432/%s" .Values.postgres.auth.username $password (include "greenkube.fullname" .) .Values.postgres.auth.database | b64enc | quote }}
  {{- else if .Values.secrets.dbConnectionString }}
  DB_CONNECTION_STRING: {{ .Values.secrets.dbConnectionString | b64enc | quote }}
  {{- end }}

  # --- Prometheus Auth ---
  {{- if .Values.secrets.prometheus.username }}
  PROMETHEUS_USERNAME: {{ .Values.secrets.prometheus.username | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.prometheus.password }}
  PROMETHEUS_PASSWORD: {{ .Values.secrets.prometheus.password | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.prometheus.bearerToken }}
  PROMETHEUS_BEARER_TOKEN: {{ .Values.secrets.prometheus.bearerToken | b64enc | quote }}
  {{- end }}

  # --- Elasticsearch Auth ---
  {{- if .Values.secrets.elasticsearch.user }}
  ELASTICSEARCH_USER: {{ .Values.secrets.elasticsearch.user | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.elasticsearch.password }}
  ELASTICSEARCH_PASSWORD: {{ .Values.secrets.elasticsearch.password | b64enc | quote }}
  {{- end }}
{{- end }}

