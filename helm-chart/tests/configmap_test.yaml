suite: configmap
templates:
  - templates/configmap.yaml

tests:
  # --------------------------------------------------------------------------
  # Kind / structure
  # --------------------------------------------------------------------------
  - it: should render a ConfigMap
    asserts:
      - isKind:
          of: ConfigMap

  - it: should include the chart labels
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: greenkube

  # --------------------------------------------------------------------------
  # Core environment variables
  # --------------------------------------------------------------------------
  - it: should set LOG_LEVEL from values
    asserts:
      - equal:
          path: data.LOG_LEVEL
          value: "INFO"

  - it: should reflect a custom log level
    set:
      config.logLevel: DEBUG
    asserts:
      - equal:
          path: data.LOG_LEVEL
          value: "DEBUG"

  - it: should set DB_TYPE
    asserts:
      - equal:
          path: data.DB_TYPE
          value: "postgres"

  - it: should reflect sqlite db type
    set:
      config.db.type: sqlite
    asserts:
      - equal:
          path: data.DB_TYPE
          value: "sqlite"

  - it: should set CLOUD_PROVIDER
    asserts:
      - equal:
          path: data.CLOUD_PROVIDER
          value: "unknown"

  - it: should set DEFAULT_INTENSITY
    asserts:
      - equal:
          path: data.DEFAULT_INTENSITY
          value: "500"

  - it: should set NORMALIZATION_GRANULARITY
    asserts:
      - equal:
          path: data.NORMALIZATION_GRANULARITY
          value: "hour"

  # --------------------------------------------------------------------------
  # Prometheus config
  # --------------------------------------------------------------------------
  # NOTE: PROMETHEUS_URL is now stored in the Secret (supports UI-set overrides).
  # Tests for PROMETHEUS_URL live in secret_test.yaml.
  - it: should set PROMETHEUS_QUERY_RANGE_STEP
    asserts:
      - equal:
          path: data.PROMETHEUS_QUERY_RANGE_STEP
          value: "5m"

  - it: should set PROMETHEUS_NODE_INSTANCE_LABEL
    asserts:
      - equal:
          path: data.PROMETHEUS_NODE_INSTANCE_LABEL
          value: "label_node_kubernetes_io_instance_type"

  # --------------------------------------------------------------------------
  # OpenCost config
  # --------------------------------------------------------------------------
  # NOTE: OPENCOST_API_URL is now stored in the Secret (supports UI-set overrides).
  # Tests for OPENCOST_API_URL live in secret_test.yaml.

  # --------------------------------------------------------------------------
  # API config
  # --------------------------------------------------------------------------
  - it: should set API_PORT
    asserts:
      - equal:
          path: data.API_PORT
          value: "8000"

  - it: should set CORS_ORIGINS
    asserts:
      - equal:
          path: data.CORS_ORIGINS
          value: "*"

  - it: should set API_RATE_LIMIT
    asserts:
      - equal:
          path: data.API_RATE_LIMIT
          value: "60/minute"

  - it: should omit API keys when api.enabled is false
    set:
      config.api.enabled: false
    asserts:
      - isNull:
          path: data.API_HOST
      - isNull:
          path: data.API_PORT

  # --------------------------------------------------------------------------
  # Recommendation engine config
  # --------------------------------------------------------------------------
  - it: should set RECOMMENDATION_LOOKBACK_DAYS
    asserts:
      - equal:
          path: data.RECOMMENDATION_LOOKBACK_DAYS
          value: "7"

  - it: should set RIGHTSIZING_CPU_THRESHOLD
    asserts:
      - equal:
          path: data.RIGHTSIZING_CPU_THRESHOLD
          value: "0.3"

  # --------------------------------------------------------------------------
  # Default zone (conditional key)
  # --------------------------------------------------------------------------
  - it: should NOT include DEFAULT_ZONE when empty
    asserts:
      - isNull:
          path: data.DEFAULT_ZONE

  - it: should set DEFAULT_ZONE when provided
    set:
      config.defaultZone: "FR"
    asserts:
      - equal:
          path: data.DEFAULT_ZONE
          value: "FR"
