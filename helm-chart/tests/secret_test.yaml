suite: secret
templates:
  - templates/secret.yaml

tests:
  # --------------------------------------------------------------------------
  # Kind / structure
  # --------------------------------------------------------------------------
  - it: should render a Secret of type Opaque
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque

  # --------------------------------------------------------------------------
  # Optional API tokens — absent when empty
  # --------------------------------------------------------------------------
  - it: should NOT include ELECTRICITY_MAPS_TOKEN by default
    asserts:
      - isNull:
          path: data.ELECTRICITY_MAPS_TOKEN

  - it: should encode ELECTRICITY_MAPS_TOKEN when provided
    set:
      secrets.electricityMapsToken: "my-token"
    asserts:
      - equal:
          path: data.ELECTRICITY_MAPS_TOKEN
          value: "bXktdG9rZW4="   # base64("my-token")

  - it: should NOT include BOAVIZTA_TOKEN by default
    asserts:
      - isNull:
          path: data.BOAVIZTA_TOKEN

  - it: should encode BOAVIZTA_TOKEN when provided
    set:
      secrets.boaviztaToken: "bvz-secret"
    asserts:
      - equal:
          path: data.BOAVIZTA_TOKEN
          value: "YnZ6LXNlY3JldA=="  # base64("bvz-secret")

  - it: should NOT include GREENKUBE_API_KEY by default
    asserts:
      - isNull:
          path: data.GREENKUBE_API_KEY

  - it: should encode GREENKUBE_API_KEY when provided
    set:
      secrets.apiKey: "s3cr3t"
    asserts:
      - equal:
          path: data.GREENKUBE_API_KEY
          value: "czNjcjN0"  # base64("s3cr3t")

  # --------------------------------------------------------------------------
  # Prometheus auth — absent when empty
  # --------------------------------------------------------------------------
  - it: should NOT include PROMETHEUS_USERNAME by default
    asserts:
      - isNull:
          path: data.PROMETHEUS_USERNAME

  - it: should encode PROMETHEUS_USERNAME when provided
    set:
      secrets.prometheus.username: "admin"
    asserts:
      - equal:
          path: data.PROMETHEUS_USERNAME
          value: "YWRtaW4="  # base64("admin")

  - it: should NOT include PROMETHEUS_BEARER_TOKEN by default
    asserts:
      - isNull:
          path: data.PROMETHEUS_BEARER_TOKEN

  - it: should encode PROMETHEUS_BEARER_TOKEN when provided
    set:
      secrets.prometheus.bearerToken: "tok123"
    asserts:
      - equal:
          path: data.PROMETHEUS_BEARER_TOKEN
          value: "dG9rMTIz"  # base64("tok123")

  # --------------------------------------------------------------------------
  # Runtime URL overrides — stored in Secret so the UI can patch them
  # --------------------------------------------------------------------------
  - it: should NOT include PROMETHEUS_URL by default
    asserts:
      - isNull:
          path: data.PROMETHEUS_URL

  - it: should encode PROMETHEUS_URL when provided via values
    set:
      config.prometheus.url: "http://prometheus:9090"
    asserts:
      - equal:
          path: data.PROMETHEUS_URL
          value: "aHR0cDovL3Byb21ldGhldXM6OTA5MA=="  # base64("http://prometheus:9090")

  - it: should NOT include OPENCOST_API_URL by default
    asserts:
      - isNull:
          path: data.OPENCOST_API_URL

  - it: should encode OPENCOST_API_URL when provided via values
    set:
      config.opencost.url: "http://opencost:9003"
    asserts:
      - equal:
          path: data.OPENCOST_API_URL
          value: "aHR0cDovL29wZW5jb3N0OjkwMDM="  # base64("http://opencost:9003")

  - it: should include BOAVIZTA_API_URL with the default public URL
    asserts:
      - equal:
          path: data.BOAVIZTA_API_URL
          value: "aHR0cHM6Ly9hcGkuYm9hdml6dGEub3Jn"  # base64("https://api.boavizta.org")

  - it: should encode BOAVIZTA_API_URL when overridden via values
    set:
      config.boavizta.url: "https://custom-boavizta.example.com"
    asserts:
      - equal:
          path: data.BOAVIZTA_API_URL
          value: "aHR0cHM6Ly9jdXN0b20tYm9hdml6dGEuZXhhbXBsZS5jb20="  # base64("https://custom-boavizta.example.com")

  # --------------------------------------------------------------------------
  # Elasticsearch auth — absent when empty
  # --------------------------------------------------------------------------
  - it: should NOT include ELASTICSEARCH_USER by default
    asserts:
      - isNull:
          path: data.ELASTICSEARCH_USER

  - it: should encode ELASTICSEARCH_USER when provided
    set:
      secrets.elasticsearch.user: "elastic"
    asserts:
      - equal:
          path: data.ELASTICSEARCH_USER
          value: "ZWxhc3RpYw=="  # base64("elastic")

  # --------------------------------------------------------------------------
  # Postgres password — generated when blank
  # --------------------------------------------------------------------------
  - it: should include POSTGRES_PASSWORD when postgres is enabled
    asserts:
      - isNotEmpty:
          path: data.POSTGRES_PASSWORD

  - it: should include DB_CONNECTION_STRING when postgres is enabled
    asserts:
      - isNotEmpty:
          path: data.DB_CONNECTION_STRING

  - it: should NOT include POSTGRES_PASSWORD when postgres is disabled
    set:
      postgres.enabled: false
      config.db.type: postgres
      secrets.dbConnectionString: "postgresql://u:p@host:5432/db"
    asserts:
      - isNull:
          path: data.POSTGRES_PASSWORD

  - it: should encode a custom dbConnectionString when postgres is disabled
    set:
      postgres.enabled: false
      config.db.type: postgres
      secrets.dbConnectionString: "postgresql://u:p@host:5432/db"
    asserts:
      - equal:
          path: data.DB_CONNECTION_STRING
          value: "cG9zdGdyZXNxbDovL3U6cEBob3N0OjU0MzIvZGI="  # base64 of the string

  # --------------------------------------------------------------------------
  # existingSecret — skip chart-managed Secret
  # --------------------------------------------------------------------------
  - it: should NOT render a Secret when existingSecret is set
    set:
      secrets.existingSecret: "my-external-secret"
    asserts:
      - hasDocuments:
          count: 0
