# Default values for greenkube.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: greenkube/greenkube
  pullPolicy: IfNotPresent

  # Overrides the image tag whose default is the chart appVersion.
  tag: 0.2.7

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ''

rbac:
  # Specifies whether RBAC resources (ClusterRole, ClusterRoleBinding) should be created
  create: true

# Non-sensitive configuration passed as environment variables from config.py
# These values will be stored in a ConfigMap.
config:
  logLevel: INFO
  cloudProvider: unknown
  # Cluster name for multi-cluster environments. Used as the `cluster` label
  # in Prometheus metrics so you can filter/join across clusters in Grafana.
  clusterName: ''
  defaultZone: '' # Override with your Electricity Maps zone code (e.g. 'FR', 'DE', 'US-CAL-CISO').
                  # Leave empty to let GreenKube auto-discover the zone from node labels.
                  # Falls back to DEFAULT_INTENSITY (gCO2/kWh) if zone cannot be determined.
  defaultIntensity: 500.0 # gCO2e/kWh, used when Electricity Maps fails
  # Normalization granularity for carbon intensity lookups.
  # Supported: "hour", "day", "none"
  normalizationGranularity: hour

  # Interval for analyzing nodes (e.g., "5m", "1h")
  nodeAnalysisInterval: 5m

  # Max age for historical node data in days
  nodeDataMaxAgeDays: 30

  # --- Metrics Retention & Compression ---
  # Age threshold (hours) after which raw 5-min metrics are compressed
  # into hourly aggregates. Aligns with Electricity Maps hourly granularity.
  metricsCompressionAgeHours: 24
  # Maximum number of days to retain raw (uncompressed) 5-min metrics.
  # Older raw rows are deleted after compression. Set -1 to disable deletion.
  metricsRawRetentionDays: 7
  # Maximum number of days to retain hourly aggregated metrics.
  # Set -1 (default) to keep data indefinitely — required for multi-year
  # comparison and CSRD/ESRS E1 yearly reporting.
  metricsAggregatedRetentionDays: -1

  # Timeout in seconds for Kubernetes API calls (list_node, list_pod, etc.).
  # Prevents greenkube start from hanging indefinitely if the API server is slow.
  # Set to 0 to disable the timeout.
  k8sRequestTimeout: 30

  # Boavizta configuration
  boavizta:
    url: https://api.boavizta.org

  # Database configuration
  db:
    # Supported: "elasticsearch", "postgres", "sqlite"
    # WARNING: "sqlite" is not recommended for production as data will be lost on pod restart.
    type: postgres
    # Path for the sqlite database file (only used if db.type is "sqlite")
    path: /data/greenkube_data.db
    # Database schema (only used if db.type is "postgres")
    schema: public
    # Connection pool sizing (PostgreSQL only)
    poolMinSize: 1
    poolMaxSize: 10
    # Statement timeout in milliseconds (prevents runaway queries)
    statementTimeoutMs: 30000

  # Persistence configuration for SQLite
  persistence:
    enabled: false
    # Storage Class Name (leave empty for default)
    storageClassName: ''
    accessMode: ReadWriteOnce
    size: 1Gi

  # Prometheus collector configuration
  prometheus:
    # If empty, GreenKube will attempt in-cluster discovery.
    url: ''
    verifyCerts: true
    # Prometheus query step (e.g., "5m", "1h"). Must be a divisor of 24 hours.
    queryRangeStep: 5m
    # Maximum number of data points to fetch in a single range query.
    queryRangeMaxSamples: 10000
    # The node label to use for discovering the instance type.
    nodeInstanceLabel: label_node_kubernetes_io_instance_type

  # OpenCost collector configuration
  opencost:
    # If empty, GreenKube will attempt in-cluster discovery.
    url: ''
    verifyCerts: true

  # Threshold in cores below which Prometheus totals are considered too small
  lowNodeCpuThreshold: 0.05

  # Comma-separated list of allowed CORS origins.
  # Use "*" to allow all origins (default).
  corsOrigins: '*'

  # Rate limit for API endpoints (slowapi format, e.g. "60/minute", "100/hour").
  apiRateLimit: 60/minute

  # API server configuration
  api:
    enabled: true
    host: 0.0.0.0
    port: 8000

    # Liveness probe: restarts the container if the API becomes unresponsive.
    livenessProbe:
      enabled: true
      path: /api/v1/health
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1

    # Readiness probe: removes the pod from service endpoints until the API is ready.
    readinessProbe:
      enabled: true
      path: /api/v1/health
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
      successThreshold: 1

  # Default instance profile for energy estimation when an instance type is unknown
  defaults:
    # Default Power Usage Effectiveness (PUE). Overridden by cloudProvider-specific values if available.
    pue: 1.3
    instance:
      vcores: 1
      minWatts: 1.0
      maxWatts: 10.0

  # Recommendation engine configuration
  recommendations:
    lookbackDays: 7
    rightsizingCpuThreshold: 0.3
    rightsizingMemoryThreshold: 0.3
    rightsizingHeadroom: 1.2
    zombieCostThreshold: 0.01
    zombieEnergyThreshold: 1000
    autoscalingCvThreshold: 0.7
    autoscalingSpikeRatio: 3.0
    offPeakIdleThreshold: 0.05
    offPeakMinIdleHours: 4
    idleNamespaceEnergyThreshold: 1000
    carbonAwareThreshold: 1.5
    nodeUtilizationThreshold: 0.2
    # If false, system namespaces (e.g., kube-system, coredns) will be excluded from recommendations
    recommendSystemNamespaces: false

# Configuration for Elasticsearch (if db.type is "elasticsearch")
elasticsearch:
  hosts: http://elasticsearch-master:9200 # K8s service name for Elasticsearch
  indexName: carbon_intensity
  verifyCerts: true

# Sensitive values that will be stored in a Kubernetes Secret.
secrets:
  # Electricity Maps API Token (Optional)
  # Without it, GreenKube uses the default carbon intensity value (config.defaultIntensity).
  # Get yours at: https://www.electricitymaps.com/
  electricityMapsToken: ''

  # Boavizta API Token (Optional)
  boaviztaToken: ''

  # API Key for GreenKube API authentication (Optional).
  # If empty, no authentication is required.
  apiKey: ''

  # Connection string for PostgreSQL (only used if db.type is "postgres")
  # Example: "postgresql://user:password@host:port/dbname"
  dbConnectionString: ''

  # Prometheus authentication
  prometheus:
    username: ''
    password: ''
    bearerToken: ''

  # Elasticsearch authentication
  elasticsearch:
    user: ''
    password: ''

# Pod resource requests and limits
# -- Collector/scheduler container resources
# This container runs periodic data collection (Prometheus, OpenCost, K8s API)
# and writes to the database. Memory usage is proportional to the number of
# pods in the cluster. For clusters with >200 pods, consider increasing limits.
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# -- API container resources
# This container serves the FastAPI REST API and the SPA frontend.
# Memory usage is dominated by query result sets; the hourly aggregation
# table keeps this bounded. For clusters with >500 pods, increase memory.
apiResources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# PostgreSQL configuration (custom statefulset)
postgres:
  enabled: true
  image:
    repository: postgres
    tag: 17-alpine
    pullPolicy: IfNotPresent
  auth:
    username: greenkube
    # Set a fixed password here to ensure stability across upgrades.
    # If left empty, a random password is generated on first install and
    # preserved automatically on subsequent upgrades via secret lookup.
    password: ''
    database: greenkube
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ''
  # Resource requests and limits for the PostgreSQL container.
  # These defaults are appropriate for small-to-medium clusters (<500 pods).
  # For larger clusters, increase memory to accommodate shared_buffers and
  # query working memory.
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Prometheus → GreenKube monitoring integration (optional).
# This controls whether Prometheus scrapes GreenKube's own /prometheus/metrics endpoint.
# This is NOT required for GreenKube to collect metrics FROM Prometheus — that works automatically.
# Enable this only if you want GreenKube-computed metrics (CO₂e, cost, energy) in Grafana.
# IMPORTANT: ServiceMonitor requires the Prometheus Operator CRDs to be installed
# (e.g. via kube-prometheus-stack). If you don't have Prometheus Operator,
# leave serviceMonitor.enabled=false to avoid installation errors.
monitoring:
  serviceMonitor:
    # Create a ServiceMonitor for Prometheus Operator to discover GreenKube metrics.
    # Requires Prometheus Operator CRDs (monitoring.coreos.com/v1).
    # Set to true only if kube-prometheus-stack (or similar) is installed.
    enabled: false
    # Namespace where the ServiceMonitor will be created (must match Prometheus serviceMonitorNamespaceSelector).
    namespace: monitoring
    # Scrape interval (e.g., "30s", "1m").
    interval: 30s
    # Scrape timeout.
    scrapeTimeout: 10s
    # Additional labels to add to the ServiceMonitor (merged with default kube-prometheus labels).
    additionalLabels: {}
    # Name of the Prometheus ServiceAccount (for RBAC). Defaults to "prometheus-k8s".
    prometheusServiceAccount: prometheus-k8s

  networkPolicy:
    # Create a NetworkPolicy allowing Prometheus to scrape GreenKube on the API port.
    enabled: false
    # Namespace where Prometheus is deployed.
    prometheusNamespace: monitoring
